<!DOCTYPE html>
<html>
<head>
    <title>Pink Envelope for Laquisha</title>
    <link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-env: #FFB7C5;
            --color-env2: #ff9aad;
            --color-flap: #ff8da1;
            --color-bg: #ed7fca;
            --color-heart: #ff85a2;
        }

        body {
            background-color: var(--color-bg);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Membuat amplop tepat di tengah layar */
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .envlope-wrapper {
            position: relative;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
        }

        #envelope {
            position: relative;
            width: 350px;
            height: 220px;
            background-color: var(--color-flap);
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 20px rgba(0,0,0,.2);
        }

        .front {
            position: absolute;
            width: 0;
            height: 0;
            z-index: 3;
        }

        .flap {
            border-left: 175px solid transparent;
            border-right: 175px solid transparent;
            border-bottom: 82px solid transparent;
            border-top: 98px solid var(--color-flap);
            transform-origin: top;
            transition: transform 0.4s ease;
            z-index: 4;
        }

        .pocket {
            border-left: 175px solid var(--color-env);
            border-right: 175px solid var(--color-env);
            border-bottom: 120px solid var(--color-env2);
            border-top: 90px solid transparent;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
            z-index: 3;
        }

        /* --- Letter --- */
        .letter {
            position: absolute;
            background-color: #ffffff;
            width: 90%;
            height: 95%;
            top: 5%;
            left: 5%;
            border-radius: 6px;
            z-index: 2;
            transition: transform 0.5s ease;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
        }

        .message {
            font-family: 'Handlee', cursive;
            color: #d46a84;
            margin-top: 10px;
        }

        .message .title { font-size: 1.2em; margin-bottom: 5px; }
        .message .love-text { font-size: 2.2em; color: #ff4d6d; font-weight: bold; margin: 10px 0; }
        .message .text { font-size: 0.9em; line-height: 1.2; }

        /* --- Decorations --- */
        .snoopy-img {
            position: absolute;
            bottom: 5px;
            right: 10px;
            width: 65px;
        }

        .balloon {
            position: absolute;
            top: 5px;
            left: 10px;
            font-size: 30px;
            animation: sway 2s ease-in-out infinite alternate;
        }

        /* --- States (Open/Close) --- */
        .open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .open .letter {
            transform: translateY(-160px);
            z-index: 2;
        }

        /* --- Animations --- */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes sway {
            from { transform: rotate(-10deg); }
            to { transform: rotate(10deg); }
        }

        /* --- Buttons --- */
        .buttons {
            margin-top: 40px;
            z-index: 10;
        }

        button {
            background-color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            color: #d46a84;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        button:hover {
            background-color: #ff9aad;
            color: white;
        }
    </style>
</head>
<body>

    <div class="envlope-wrapper">
        <div id="envelope" class="close">
            <div class="front flap"></div>
            <div class="front pocket"></div>
            
            <div class="letter">
                <div class="balloon">🎈</div>
                <img src="/image/snoopy.png" class="snoopy-img">
                
                <div class="message">
                    <div class="title">Happy Birthday Laquisha💐🫰</div>
                    <div class="love-text">LOVE</div>
                    <div class="text">Wyatb yaa, semoga kamu always diberi kemudahan dan diberi kelancaran dalam apapun itu <br><strong>- SweetyFamzi</strong></div>
                </div>
            </div>
        </div>
    </div>

    <div class="buttons">
        <button id="open">Buka Amplop</button>
        <button id="reset">Tutup</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            const envelope = $('#envelope');
            
            $("#open").click(function() {
                envelope.removeClass("close").addClass("open");
            });

            $("#reset").click(function() {
                envelope.removeClass("open").addClass("close");
            });

            // Klik amplop juga bisa buka
            envelope.click(function() {
                if (envelope.hasClass("open")) {
                    envelope.removeClass("open").addClass("close");
                } else {
                    envelope.removeClass("close").addClass("open");
                }
            });
        });
    </script>
</body>
</html>
